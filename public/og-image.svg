<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b15"/>
      <stop offset="1" stop-color="#06080f"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="10%" r="70%">
      <stop offset="0" stop-color="#4d8dff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4d8dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="5%" cy="100%" r="60%">
      <stop offset="0" stop-color="#6ee7ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#6ee7ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#79a9ff"/>
      <stop offset="1" stop-color="#6ee7ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g font-family="'Segoe UI', system-ui, sans-serif">
    <!-- badge -->
    <rect x="80" y="96" width="60" height="60" rx="16" fill="#4d8dff"/>
    <text x="110" y="138" text-anchor="middle" font-weight="800" font-size="28" fill="#fff" letter-spacing="-1">CP</text>
    <text x="160" y="135" font-family="monospace" font-size="22" fill="#aab3c6" letter-spacing="3">LIMASSOL · CYPRUS</text>

    <!-- name -->
    <text x="80" y="320" font-weight="800" font-size="96" fill="#e9edf6" letter-spacing="-4">Charalampos</text>
    <text x="80" y="420" font-weight="800" font-size="96" fill="url(#accent)" letter-spacing="-4">Photiou</text>

    <!-- title -->
    <text x="84" y="510" font-size="34" fill="#aab3c6" letter-spacing="-0.5">Web Developer &amp; Digital Marketing Executive</text>
  </g>
</svg>
